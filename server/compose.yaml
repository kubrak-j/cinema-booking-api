name: cinema-app

services:
  db:
    image: postgres:17-alpine
    container_name: cinema-db
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: [ "CMD", "pg_isready", "-U", "${POSTGRES_USER}", "-d", "${POSTGRES_DB}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - pgdata:/var/lib/postgresql/data

  server:
    build:
      context: .
    image: cinema-server-image:latest
    container_name: cinema-server
    environment:
      NODE_ENV: production
      PORT: ${PORT:-7000}
      DATABASE_URL: ${DATABASE_URL}
    env_file:
      - .env
    ports:
      - "${PORT:-7000}:${PORT:-7000}"
    depends_on:
       db:
         condition: service_healthy

volumes:
  pgdata:
